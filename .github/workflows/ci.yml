name: CI - Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      # CHANGE: npm ci -> npm install
      - run: npm install
      - run: npm test
      - uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test.js
          retention-days: 7
