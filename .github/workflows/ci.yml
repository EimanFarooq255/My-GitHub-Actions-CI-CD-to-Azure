name: CI - Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Update to v4
      - uses: actions/setup-node@v4  # Update to v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      
      # If you're using artifacts here too, update them
      - uses: actions/upload-artifact@v4  # Changed to v4
        with:
          name: test-results
          path: test.js
          retention-days: 7
