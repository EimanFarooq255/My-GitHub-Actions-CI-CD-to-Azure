name: CD - Deploy to Azure

on:
  push:
    branches: [ main ]

env:
  AZURE_WEBAPP_NAME: my-first-app-eiman

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      # CHANGE: npm ci -> npm install
      - run: npm install
      - run: npm test
      - run: zip -r release.zip . -x "*.git*" "node_modules/*"
      - uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip
