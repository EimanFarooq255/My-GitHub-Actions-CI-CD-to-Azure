name: CD - Deploy to Azure

on:
  push:
    branches: [ main ]

env:
  AZURE_WEBAPP_NAME: my-first-app-eiman

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Also update checkout to v4
      - uses: actions/setup-node@v4  # Update setup-node to v4
        with:
          node-version: '18'
      - run: npm ci
      - run: npm test
      - run: zip -r release.zip . -x "*.git*" "node_modules/*"
      
      # CHANGED: v3 -> v4
      - uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip
